<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>⛈️ Alerta de Chuva</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

  <h1>🌧️ Alerta de Chuva </h1>

  <div class="mapa-fixo-container">
    <small id="mapaLegenda">Mapa em tempo real, atualizado a cada 10min </small>
    <iframe
      id="mapaRadar"
      class="mapa-fixo"
      src="https://www.rainviewer.com/map.html?loc=-20.8113,-49.3758,10&oCS=1&c=3&o=83&lm=1&layer=radar&sm=1&sn=1"
      title="Mapa em tempo real, atualizado a cada 10min">
    </iframe>
  </div>

  <section class="controles" aria-label="Controles do mapa e busca de cidade">
    <a
      class="btn-ipmet"
      href="https://www.ipmetradar.com.br/2mobileGis.php"
      target="_blank"
      rel="noopener noreferrer"
    >
      🗺️ Ver no IPMet
    </a>

    <div class="busca">
      <input
        id="cidade"
        type="text"
        placeholder="Digite a cidade"
        aria-label="Nome da cidade"
      >
      <button id="btnBuscar" type="button">🔎 Buscar cidade</button>
      <button id="btnGPS" type="button">📍 Meu local atual</button>
      <button id="btnRefresh" type="button">🔄 Atualizar</button>
    </div>
  </section>

  <section class="previsao-12h" aria-label="Previsão horária para as próximas 12 horas">
    <h2>Próximas 12h</h2>
    <div class="previsao-scroll" id="previsao12h" role="list"></div>
  </section>

  <div class="box">
    <div id="cidadeAtual" class="cidade-atual">
      📍 Cidade: <b>São José do Rio Preto-SP</b>
    </div>
    <div class="status" id="status">⏳ Carregando...</div>
    <div id="detalhe"></div>
    <div id="alerta"></div>
    <!--  <div id="contador"></div> -->
    <div id="ultimaAtualizacao"></div>
  </div>

  <footer>
    <small>Desenvolvido por LDZ</small>
  </footer>

  <audio id="alertSound" preload="auto">
    <source src="alerta.mp3" type="audio/mpeg">
  </audio>

</body>
</html>
